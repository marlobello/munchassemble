name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build (TypeScript)
        working-directory: app
        run: npm run build

      - name: Run tests
        working-directory: app
        run: npm test

      - name: Audit (no critical vulnerabilities)
        working-directory: app
        # Audit level set to 'critical' only — 'high' undici advisory is a transitive
        # discord.js dependency with no semver-compatible fix available upstream yet.
        run: npm audit --audit-level=critical

  bicep-lint:
    name: Bicep Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep

      - name: Build Bicep (lint)
        run: az bicep build --file infra/main.bicep
