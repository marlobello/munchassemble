name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-munchassemble-prod

permissions:
  id-token: write
  contents: read

jobs:
  bicep-what-if:
    name: What-If (PR preview)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep What-If
        run: |
          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/env/prod.bicepparam

  deploy:
    name: Deploy Bicep
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "$AZURE_RESOURCE_GROUP" \
            --location centralus \
            --output none

      - name: Preserve current container image
        id: current_image
        run: |
          IMAGE=$(az containerapp show \
            --name ca-munchassemble-prod \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.template.containers[0].image" \
            --output tsv 2>/dev/null || echo "")
          # Fall back to placeholder only on very first deploy (app not yet deployed)
          if [ -z "$IMAGE" ]; then
            IMAGE="mcr.microsoft.com/azuredocs/containerapps-helloworld:latest"
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Using image: $IMAGE"

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/env/prod.bicepparam \
            --parameters containerImage="${{ steps.current_image.outputs.image }}" \
            --name "deploy-$(date +%Y%m%d-%H%M%S)"
